<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensajes — Construlinker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { overflow: hidden; }

    /* ══ MESSAGES SHELL ══════════════════════════════════════ */
    .msg-shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - var(--nav-h));
      margin-top: var(--nav-h);
    }

    /* ── LEFT: CONVERSATIONS LIST ──────────────────────────── */
    .conv-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .conv-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .conv-header__top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 12px;
    }
    .conv-header__title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 700; color: var(--text);
    }
    .conv-new-btn {
      width: 30px; height: 30px;
      background: var(--orange); color: #000;
      border: none; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background var(--trans);
      flex-shrink: 0;
    }
    .conv-new-btn:hover { background: var(--orange-hover); }
    .conv-new-btn svg { width: 15px; height: 15px; }
    .conv-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0 10px; height: 34px;
    }
    .conv-search svg { width: 13px; height: 13px; color: var(--text-dim); flex-shrink: 0; }
    .conv-search input {
      background: none; border: none; outline: none;
      font-family: inherit; font-size: 13px; color: var(--text);
      width: 100%;
    }
    .conv-search input::placeholder { color: var(--text-dim); }

    /* Filter tabs */
    .conv-tabs {
      display: flex; gap: 0;
      padding: 10px 18px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .conv-tab {
      font-size: 12px; font-weight: 600;
      padding: 6px 14px;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all var(--trans);
    }
    .conv-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
    .conv-tab:hover:not(.active) { color: var(--text); }

    /* Conversation items */
    .conv-list {
      flex: 1; overflow-y: auto;
      padding: 6px 0;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .conv-item {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 12px 18px;
      cursor: pointer; transition: background var(--trans);
      position: relative;
      border-left: 3px solid transparent;
    }
    .conv-item:hover { background: var(--card); }
    .conv-item.active { background: var(--card); border-left-color: var(--orange); }
    .conv-item.unread .ci-name { color: var(--text); font-weight: 700; }
    .conv-item.unread .ci-preview { color: var(--text-muted); }

    .ci-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0; position: relative;
    }
    .ci-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--surface);
    }
    .ci-online.available { background: var(--green); }
    .ci-online.limited   { background: var(--yellow); }
    .ci-online.busy      { background: var(--red); }

    .ci-body { flex: 1; min-width: 0; }
    .ci-top  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .ci-name { font-size: 13.5px; font-weight: 600; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ci-time { font-size: 10.5px; color: var(--text-dim); flex-shrink: 0; margin-left: 4px; }
    .ci-preview {
      font-size: 12px; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ci-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange); flex-shrink: 0;
      align-self: center; margin-left: 4px;
    }
    .ci-role { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }

    /* Empty conv list */
    .conv-empty {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 48px 20px;
      text-align: center; color: var(--text-dim); font-size: 12.5px;
    }
    .conv-empty svg { opacity: .4; }

    /* ── RIGHT: CHAT WINDOW ────────────────────────────────── */
    .chat-panel {
      display: flex; flex-direction: column;
      background: var(--bg); overflow: hidden;
    }

    /* Chat header */
    .chat-header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      height: 64px; flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .chat-header__avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .chat-header__info { flex: 1; }
    .chat-header__name { font-size: 14.5px; font-weight: 700; color: var(--text); }
    .chat-header__meta { font-size: 11.5px; color: var(--text-muted); }
    .chat-header__actions { display: flex; gap: 8px; }
    .chat-action-btn {
      width: 34px; height: 34px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex;
      align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: all var(--trans);
    }
    .chat-action-btn:hover { background: var(--card-hover); color: var(--text); }
    .chat-action-btn.orange { background: var(--orange-dim); border-color: rgba(255,107,0,.25); color: var(--orange); }
    .chat-action-btn.orange:hover { background: var(--orange); color: #000; }
    .chat-action-btn svg { width: 15px; height: 15px; }

    /* Messages area */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Date separator */
    .msg-date-sep {
      display: flex; align-items: center; gap: 10px;
      margin: 10px 0 6px;
    }
    .msg-date-sep::before,
    .msg-date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .msg-date-sep span { font-size: 10.5px; color: var(--text-dim); font-weight: 500; white-space: nowrap; }

    /* Message bubble */
    .msg-row { display: flex; gap: 8px; margin-bottom: 2px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-row.mine + .msg-row.mine .msg-avatar,
    .msg-row:not(.mine) + .msg-row:not(.mine) .msg-avatar { visibility: hidden; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg-bubble-wrap { display: flex; flex-direction: column; max-width: 68%; }
    .msg-row.mine .msg-bubble-wrap { align-items: flex-end; }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13.5px; line-height: 1.5;
      word-break: break-word;
      animation: msgIn .18s ease;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .msg-row:not(.mine) .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-row.mine .msg-bubble {
      background: var(--orange);
      color: #000;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px; color: var(--text-dim);
      margin-top: 3px; padding: 0 2px;
    }
    .msg-row.mine .msg-time { text-align: right; }

    /* Status indicators */
    .msg-status { font-size: 10px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 2px; }
    .msg-status.read { color: var(--orange); }

    /* System message */
    .msg-system {
      text-align: center; font-size: 11.5px;
      color: var(--text-dim); margin: 8px 0;
      padding: 6px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; align-self: center;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none; align-items: center; gap: 8px;
      padding: 4px 0 8px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: typingBounce 1.2s ease infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .typing-label { font-size: 11.5px; color: var(--text-dim); font-style: italic; }

    /* Chat input */
    .chat-input-area {
      padding: 12px 20px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px 8px 16px;
      transition: border-color var(--trans);
    }
    .chat-input-wrap:focus-within { border-color: var(--border-light); }
    .chat-input-wrap textarea {
      flex: 1; background: none; border: none; outline: none;
      font-family: inherit; font-size: 13.5px;
      color: var(--text); resize: none;
      max-height: 120px; min-height: 22px;
      line-height: 1.5; padding: 0;
    }
    .chat-input-wrap textarea::placeholder { color: var(--text-dim); }
    .chat-send-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--orange); color: #000;
      border: none; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background var(--trans), transform .1s;
    }
    .chat-send-btn:hover { background: var(--orange-hover); }
    .chat-send-btn:active { transform: scale(.95); }
    .chat-send-btn svg { width: 15px; height: 15px; }
    .chat-attach-btn {
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 4px; border-radius: var(--radius);
      transition: color var(--trans);
      align-self: flex-end;
    }
    .chat-attach-btn:hover { color: var(--text); }
    .chat-attach-btn svg { width: 17px; height: 17px; display: block; }
    .chat-input-hint {
      font-size: 10.5px; color: var(--text-dim);
      text-align: center; margin-top: 6px;
    }

    /* ── EMPTY CHAT STATE ──────────────────────────────────── */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 40px;
      color: var(--text-dim);
    }
    .chat-empty svg { opacity: .3; }
    .chat-empty__title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-muted); }
    .chat-empty__desc  { font-size: 13px; max-width: 320px; line-height: 1.6; }

    /* ── NEW CONVERSATION PANEL ──────────────────────────────  */
    .new-conv-panel {
      position: absolute; left: 0; top: 0;
      width: 320px; height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 10;
      transform: translateX(-100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .new-conv-panel.open { transform: translateX(0); }
    .new-conv-header {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .new-conv-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
    .new-conv-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* Responsive */
    @media(max-width:768px) {
      .msg-shell { grid-template-columns: 1fr; }
      .conv-panel { display: none; }
      .conv-panel.mobile-open { display: flex; position: fixed; inset: var(--nav-h) 0 0 0; z-index: 50; }
    }
  </style>
</head>
<body>

 <!-- ══ TOPNAV DINÁMICO UNIVERSAL ════════════════════════════ -->

      <a class="topnav__brand" href="index.html">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2 18h20v2H2z"/><path d="M12 4C8 4 5 8 5 12v6h14v-6c0-4-3-8-7-8z"/><line x1="12" y1="4" x2="12" y2="12"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>

      <!-- Enlaces Dinámicos -->

      <!-- Créditos (Solo Empresa) -->
      <div class="topnav__credits" id="dynamicCredits" onclick="window.location.href='index.html?page=creditos'" style="display:none; cursor:pointer;">
        <svg viewBox="0 0 24 24" fill="currentColor" class="credits-diamond"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>

      </div>

  <script>
    (function(){
      // Lógica para pintar el menú correcto según el rol activo
      const s = JSON.parse(localStorage.getItem('cl_session') || '{}');
      const isWorker = s.type === 'trabajador';
      const navContainer = document.getElementById('dynamicNavLinks');
      const credContainer = document.getElementById('dynamicCredits');
      const path = window.location.pathname;

      if (isWorker) {
        navContainer.innerHTML = `
          <button class="nav-link" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Inicio</span></button>
          <button class="nav-link" onclick="window.location.href='index.html?page=buscar'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Empresas</span></button>
          <button class="nav-link ${path.includes('messages') ? 'active' : ''}" onclick="window.location.href='messages.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Mensajes</span></button>
          <button class="nav-link" onclick="window.location.href='index.html?page=perfil'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Mi Perfil</span></button>
        `;
      } else {
        navContainer.innerHTML = `
          <button class="nav-link" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Inicio</span></button>
          <button class="nav-link" onclick="window.location.href='index.html?page=buscar'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Personal</span></button>
          <button class="nav-link ${path.includes('messages') ? 'active' : ''}" onclick="window.location.href='messages.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Mensajes</span></button>
          <button class="nav-link ${path.includes('job-offer') ? 'active' : ''}" onclick="window.location.href='job-offer.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><span>Publicar Oferta</span></button>
        `;
        credContainer.style.display = 'flex';
        try {
          const st = JSON.parse(localStorage.getItem('construlinker_state') || '{}');
          document.getElementById('creditsNavHeader').textContent = st.credits ?? 10;
        } catch(e){}
      }
    })();
  </script>

  <!-- ══ MESSAGES SHELL ════════════════════════════════════ -->
  <div class="msg-shell" style="position:relative">

    <!-- ── CONVERSATIONS LIST ──────────────────────────── -->
    <div class="conv-panel" id="convPanel">
      <div class="conv-header">
        <div class="conv-header__top">
          <div class="conv-header__title">Mensajes</div>
          <button class="conv-new-btn" onclick="openNewConv()" title="Nueva conversación">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="conv-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" placeholder="Buscar conversación…" id="convSearch" oninput="filterConvs(this.value)" />
        </div>
      </div>
      <div class="conv-tabs">
        <button class="conv-tab active" onclick="setConvTab('all',this)">Todos</button>
        <button class="conv-tab" onclick="setConvTab('unread',this)">No leídos</button>
        <button class="conv-tab" onclick="setConvTab('archived',this)">Archivados</button>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- ── CHAT WINDOW ─────────────────────────────────── -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" width="64" height="64"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <div class="chat-empty__title">Tus mensajes</div>
        <div class="chat-empty__desc">Selecciona una conversación o inicia una nueva con cualquier profesional que hayas desbloqueado.</div>
        <button class="btn-orange" onclick="openNewConv()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva conversación
        </button>
      </div>

      <!-- Active chat (hidden until conv selected) -->
      <div id="activeChat" style="display:none;flex-direction:column;height:100%">
        <!-- Header -->
        <div class="chat-header" id="chatHeader"></div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Typing -->
        <div style="padding:0 20px">
          <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
            <span class="typing-label" id="typingLabel">Escribiendo…</span>
          </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <button class="chat-attach-btn" title="Adjuntar archivo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="msgInput" placeholder="Escribe tu mensaje…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
            <button class="chat-send-btn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
            </button>
          </div>
          <div class="chat-input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
        </div>
      </div>
    </div>

    <!-- ── NEW CONVERSATION PANEL ──────────────────────── -->
    <div class="new-conv-panel" id="newConvPanel">
      <div class="new-conv-header">
        <button class="modal-close" onclick="closeNewConv()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="new-conv-title">Nueva conversación</div>
      </div>
      <div style="padding:10px 18px 0">
        <div class="conv-search" style="margin-bottom:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" placeholder="Buscar profesional desbloqueado…" id="newConvSearch" oninput="filterNewConv(this.value)"/>
        </div>
      </div>
      <div class="new-conv-list" id="newConvList"></div>
    </div>

  </div>

  <!-- ══ TOAST ═════════════════════════════════════════════ -->
  <div class="toast" id="toastEl">
    <div class="toast__icon" id="toastIcon"></div>
    <div class="toast__body"><strong id="toastTitle"></strong><span id="toastSub"></span></div>
  </div>

  <script>
  'use strict';

  /* ── PROFESIONALES (espejo de app.js) ─────────────────── */
  const PROFESSIONALS = [
    { id:1,  name:"Rafael Montoya",  specialty:"Ing. Civil Estructural",        availability:"available", color:["#1A3A6E","#2A5A9E"], initials:"RM" },
    { id:2,  name:"Valeria Torres",  specialty:"Arquitecta Senior",             availability:"available", color:["#3A1A6E","#5A2A9E"], initials:"VT" },
    { id:3,  name:"Carlos Espinoza", specialty:"Maestro de Obra",               availability:"busy",      color:["#1A5E2A","#2A8E3E"], initials:"CE" },
    { id:4,  name:"Sofía Quispe",    specialty:"Técnico de PRL / SSOMA",        availability:"available", color:["#6E3A1A","#9E5A2A"], initials:"SQ" },
    { id:5,  name:"Diego Paredes",   specialty:"Residente de Obra",             availability:"available", color:["#6E1A3A","#9E2A5A"], initials:"DP" },
    { id:6,  name:"Lucía Benítez",   specialty:"Electricista Industrial",        availability:"limited",   color:["#1A6E6E","#2A9E9E"], initials:"LB" },
    { id:7,  name:"Marco Ríos",      specialty:"Oficial Albañil de Primera",    availability:"available", color:["#5A3A1A","#8A5A2A"], initials:"MR" },
    { id:8,  name:"Ana Fuentes",     specialty:"Pintora de Acabados",           availability:"available", color:["#1A3A5E","#2A5A8E"], initials:"AF" },
    { id:9,  name:"Pedro Cárdenas",  specialty:"Operador de Grúa Torre",        availability:"limited",   color:["#4E1A1A","#7E2A2A"], initials:"PC" },
    { id:10, name:"Rosa Mamani",     specialty:"Gasfitero / Instalaciones IISS",availability:"available", color:["#1A2A6E","#2A3A9E"], initials:"RM" },
    { id:11, name:"Jorge Huanca",    specialty:"Peón de Construcción",          availability:"available", color:["#2A4A2A","#3A6A3A"], initials:"JH" },
    { id:12, name:"Sandra Vargas",   specialty:"Ing. de Presupuestos",          availability:"limited",   color:["#4A2A5A","#6A3A8A"], initials:"SV" },
  ];

  /* ── STATE ─────────────────────────────────────────────── */
  const MSG_KEY   = 'construlinker_messages';
  const STATE_KEY = 'construlinker_state';

  let conversations = [];
  let activeConvId  = null;
  let convTab       = 'all';
  let typingTimer   = null;
  let autoReplTimer = null;
  let unlockedIds   = [];

  /* ── INIT ───────────────────────────────────────────────── */
  function init() {
    loadState();
    loadMessages();
    renderConvList();

    // Open conv from URL param
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('conv');
    if (cid) openConversation(parseInt(cid));
  }

  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
      document.getElementById('creditsNav').textContent = s.credits ?? 10;
      unlockedIds = s.unlocked ?? [];
      // Demo: always show some unlocked for usability
      if (!unlockedIds.length) unlockedIds = [1, 2, 4, 5, 7];
    } catch(e) { unlockedIds = [1, 2, 4, 5, 7]; }
  }

  function loadMessages() {
    try {
      conversations = JSON.parse(localStorage.getItem(MSG_KEY) || '[]');
    } catch(e) { conversations = []; }

    // Seed demo conversations if empty
    if (!conversations.length) {
      conversations = [
        {
          id: 1001, workerId: 1, unread: 2,
          messages: [
            { id:1, from:'worker', text:'Hola, vi que desbloqueasteis mi perfil. ¿Tienen alguna oportunidad para un ingeniero estructural?', time:'10:32', date:'Ayer' },
            { id:2, from:'empresa', text:'Buenos días Rafael. Sí, estamos buscando a alguien para supervisar la estructura de una torre de 16 pisos en Miraflores. ¿Tienes disponibilidad esta semana?', time:'10:48', date:'Ayer' },
            { id:3, from:'worker', text:'Perfecto, tengo disponibilidad a partir del lunes. Podríamos hablar por teléfono para afinar los detalles.', time:'11:05', date:'Ayer' },
            { id:4, from:'worker', text:'¿Me podrías confirmar el tipo de contrato y la duración del proyecto?', time:'11:06', date:'Ayer' },
          ]
        },
        {
          id: 1002, workerId: 5, unread: 0,
          messages: [
            { id:1, from:'empresa', text:'Diego, necesitamos un residente para una obra de 12 pisos en Surco. ¿Te interesa?', time:'09:15', date:'Hace 2 días' },
            { id:2, from:'worker', text:'Buenas. Sí me interesa, cuéntame más detalles. ¿Es jornada completa?', time:'09:40', date:'Hace 2 días' },
            { id:3, from:'empresa', text:'Jornada completa, contrato de obra. Duración estimada 14 meses. El inicio sería en 2 semanas.', time:'10:12', date:'Hace 2 días' },
            { id:4, from:'worker', text:'Perfecto. Mándame el contrato cuando puedas para revisarlo.', time:'10:30', date:'Hace 2 días' },
            { id:5, from:'empresa', text:'De acuerdo, te lo mandamos esta tarde. ¡Gracias!', time:'10:35', date:'Hace 2 días' },
          ]
        },
      ];
      saveMessages();
    }
  }

  function saveMessages() {
    try { localStorage.setItem(MSG_KEY, JSON.stringify(conversations)); } catch(e) {}
  }

  /* ── RENDER CONVERSATION LIST ─────────────────────────── */
  function renderConvList(filter = '') {
    const el = document.getElementById('convList');
    let convs = conversations;

    if (convTab === 'unread')   convs = convs.filter(c => c.unread > 0);
    if (convTab === 'archived') convs = [];

    if (filter) {
      convs = convs.filter(c => {
        const p = PROFESSIONALS.find(x => x.id === c.workerId);
        return p && p.name.toLowerCase().includes(filter.toLowerCase());
      });
    }

    if (!convs.length) {
      el.innerHTML = `<div class="conv-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>${convTab === 'archived' ? 'No tienes conversaciones archivadas.' : 'No hay conversaciones todavía.'}</span>
      </div>`;
      return;
    }

    el.innerHTML = convs.map(c => {
      const p = PROFESSIONALS.find(x => x.id === c.workerId);
      if (!p) return '';
      const last = c.messages[c.messages.length - 1];
      const grad = `background:linear-gradient(135deg,${p.color[0]},${p.color[1]})`;
      const isActive = c.id === activeConvId;
      return `
        <div class="conv-item ${c.unread ? 'unread' : ''} ${isActive ? 'active' : ''}" onclick="openConversation(${c.id})">
          <div class="ci-avatar" style="${grad}">
            ${p.initials}
            <div class="ci-online ${p.availability}"></div>
          </div>
          <div class="ci-body">
            <div class="ci-top">
              <div class="ci-name">${p.name}</div>
              <div class="ci-time">${last?.date || ''} ${last?.time || ''}</div>
            </div>
            <div class="ci-role">${p.specialty}</div>
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div class="ci-preview">${last ? (last.from === 'empresa' ? 'Tú: ' : '') + last.text : '...'}</div>
              ${c.unread ? `<div class="ci-unread-dot"></div>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function filterConvs(val) { renderConvList(val); }

  function setConvTab(tab, el) {
    convTab = tab;
    document.querySelectorAll('.conv-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderConvList();
  }

  /* ── OPEN CONVERSATION ────────────────────────────────── */
  function openConversation(convId) {
    activeConvId = convId;
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;

    // Mark as read
    conv.unread = 0;
    saveMessages();
    renderConvList();

    const p = PROFESSIONALS.find(x => x.id === conv.workerId);
    if (!p) return;

    const grad = `background:linear-gradient(135deg,${p.color[0]},${p.color[1]})`;
    const availLabels = { available:'Disponible', limited:'Disp. Limitada', busy:'No disponible' };

    // Show chat panel
    document.getElementById('chatEmpty').style.display  = 'none';
    const ac = document.getElementById('activeChat');
    ac.style.display = 'flex';

    // Render header
    document.getElementById('chatHeader').innerHTML = `
      <div class="chat-header__avatar" style="${grad}">${p.initials}</div>
      <div class="chat-header__info">
        <div class="chat-header__name">${p.name}</div>
        <div class="chat-header__meta">${p.specialty} · ${availLabels[p.availability]}</div>
      </div>
      <div class="chat-header__actions">
        <button class="chat-action-btn" onclick="window.location.href='worker-profile.html?id=${p.id}'" title="Ver perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="15" height="15"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="chat-action-btn orange" onclick="window.open('https://wa.me/${p.id}51987000000','_blank')" title="Abrir WhatsApp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="15" height="15"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        </button>
        <button class="chat-action-btn" onclick="archiveConv(${convId})" title="Archivar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="15" height="15"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        </button>
      </div>`;

    renderMessages(conv);
    scrollChatBottom(true);
  }

  /* ── RENDER MESSAGES ──────────────────────────────────── */
  function renderMessages(conv) {
    const el = document.getElementById('chatMessages');
    const p  = PROFESSIONALS.find(x => x.id === conv.workerId);
    const grad = p ? `background:linear-gradient(135deg,${p.color[0]},${p.color[1]})` : '';
    const empGrad = `background:linear-gradient(135deg,#7F2A4A,#4A2A7F)`;

    // Group by date
    let lastDate = null;
    el.innerHTML = conv.messages.map(msg => {
      const isMine   = msg.from === 'empresa';
      const dateHTML = msg.date !== lastDate
        ? `<div class="msg-date-sep"><span>${msg.date}</span></div>`
        : '';
      lastDate = msg.date;

      const avatarStyle = isMine ? empGrad : grad;
      const initials    = isMine ? 'CA' : (p?.initials || '?');

      const statusHTML = isMine
        ? `<span class="msg-status ${msg.id === conv.messages[conv.messages.length-1].id ? 'read' : ''}">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="10" height="10"><polyline points="20,6 9,17 4,12"/></svg>
             ${msg.id === conv.messages[conv.messages.length-1].id ? 'Visto' : 'Enviado'}
           </span>` : '';

      return `
        ${dateHTML}
        <div class="msg-row ${isMine ? 'mine' : ''}">
          <div class="msg-avatar" style="${avatarStyle}">${initials}</div>
          <div class="msg-bubble-wrap">
            <div class="msg-bubble">${escapeHtml(msg.text)}</div>
            <div class="msg-time">${msg.time} ${statusHTML}</div>
          </div>
        </div>`;
    }).join('');

    // System message at top
    el.insertAdjacentHTML('afterbegin', `
      <div class="msg-system">
        🔓 Perfil desbloqueado — Conversación iniciada
      </div>`);
  }

  /* ── SEND MESSAGE ─────────────────────────────────────── */
  function sendMessage() {
    const inp  = document.getElementById('msgInput');
    const text = inp.value.trim();
    if (!text || !activeConvId) return;

    const conv = conversations.find(c => c.id === activeConvId);
    if (!conv) return;

    const msg = {
      id:   Date.now(),
      from: 'empresa',
      text,
      time: new Date().toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' }),
      date: 'Hoy'
    };
    conv.messages.push(msg);
    saveMessages();

    inp.value = '';
    inp.style.height = '';
    renderMessages(conv);
    renderConvList();
    scrollChatBottom(true);

    // Simulate auto-reply
    simulateReply(conv);
  }

  function simulateReply(conv) {
    const p = PROFESSIONALS.find(x => x.id === conv.workerId);
    const replies = [
      '¡Gracias por tu mensaje! Me interesa conocer más detalles sobre el proyecto.',
      'Entendido. ¿Cuándo sería la incorporación?',
      'Perfecto, podemos coordinar por teléfono para concretar los detalles.',
      'De acuerdo. ¿Me puedes indicar el tipo de contrato y las condiciones?',
      'Muchas gracias. Estoy disponible esta semana para una reunión o llamada.',
    ];

    // Show typing indicator after 1s
    clearTimeout(typingTimer);
    clearTimeout(autoReplTimer);
    typingTimer = setTimeout(() => {
      const ti = document.getElementById('typingIndicator');
      const tl = document.getElementById('typingLabel');
      if (ti && activeConvId === conv.id) {
        ti.classList.add('visible');
        if (tl) tl.textContent = `${p?.name || 'El profesional'} está escribiendo…`;
        scrollChatBottom(false);
      }
    }, 1200);

    // Send reply after 2.5–4s
    autoReplTimer = setTimeout(() => {
      const ti = document.getElementById('typingIndicator');
      if (ti) ti.classList.remove('visible');

      const reply = {
        id:   Date.now() + 1,
        from: 'worker',
        text: replies[Math.floor(Math.random() * replies.length)],
        time: new Date().toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' }),
        date: 'Hoy'
      };
      conv.messages.push(reply);
      conv.unread = activeConvId === conv.id ? 0 : 1;
      saveMessages();
      if (activeConvId === conv.id) {
        renderMessages(conv);
        scrollChatBottom(true);
      }
      renderConvList();
    }, 2500 + Math.random() * 1500);
  }

  function scrollChatBottom(smooth = false) {
    const el = document.getElementById('chatMessages');
    if (el) el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
  }

  /* ── NEW CONVERSATION ─────────────────────────────────── */
  function openNewConv() {
    filterNewConv('');
    document.getElementById('newConvPanel').classList.add('open');
    setTimeout(() => document.getElementById('newConvSearch')?.focus(), 100);
  }
  function closeNewConv() { document.getElementById('newConvPanel').classList.remove('open'); }

  function filterNewConv(q) {
    const el = document.getElementById('newConvList');
    const available = PROFESSIONALS.filter(p =>
      unlockedIds.includes(p.id) &&
      (!q || p.name.toLowerCase().includes(q.toLowerCase()) || p.specialty.toLowerCase().includes(q.toLowerCase()))
    );

    if (!available.length) {
      el.innerHTML = `<div class="conv-empty" style="padding:24px"><span>No hay profesionales desbloqueados que coincidan.<br>Desbloquea perfiles desde el <a href="index.html?page=buscar" style="color:var(--orange)">directorio</a>.</span></div>`;
      return;
    }

    el.innerHTML = available.map(p => {
      const grad = `background:linear-gradient(135deg,${p.color[0]},${p.color[1]})`;
      const existing = conversations.find(c => c.workerId === p.id);
      return `
        <div class="conv-item" onclick="startConversation(${p.id})">
          <div class="ci-avatar" style="${grad}">${p.initials}</div>
          <div class="ci-body">
            <div class="ci-top">
              <div class="ci-name">${p.name}</div>
              ${existing ? `<span style="font-size:10px;color:var(--orange)">Activa</span>` : ''}
            </div>
            <div class="ci-role">${p.specialty}</div>
            <div class="ci-preview">${existing ? 'Conversación existente' : 'Iniciar conversación'}</div>
          </div>
        </div>`;
    }).join('');
  }

  function startConversation(workerId) {
    closeNewConv();
    const existing = conversations.find(c => c.workerId === workerId);
    if (existing) { openConversation(existing.id); return; }

    const p  = PROFESSIONALS.find(x => x.id === workerId);
    const id = Date.now();
    const newConv = {
      id, workerId, unread: 0,
      messages: [{
        id: 1, from: 'sistema',
        text: `Conversación iniciada con ${p.name}`,
        time: new Date().toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' }),
        date: 'Hoy'
      }]
    };
    conversations.unshift(newConv);
    saveMessages();
    renderConvList();
    openConversation(id);
  }

  function archiveConv(convId) {
    conversations = conversations.filter(c => c.id !== convId);
    saveMessages();
    activeConvId = null;
    document.getElementById('chatEmpty').style.display  = 'flex';
    document.getElementById('activeChat').style.display = 'none';
    renderConvList();
    showToast('Conversación archivada','Puedes verla en la pestaña Archivados.');
  }

  /* ── INPUT HELPERS ────────────────────────────────────── */
  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); sendMessage();
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  /* ── TOAST ────────────────────────────────────────────── */
  let toastTimer;
  function showToast(title, sub, ok=true) {
    const el = document.getElementById('toastEl');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastSub').textContent   = sub;
    document.getElementById('toastIcon').innerHTML = ok
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><polyline points="20,6 9,17 4,12"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="13" height="13"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>`;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
